name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # PyPI 发布
  build-pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/*.tar.gz dist/*.whl

  # Linux 构建
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller ITrans.spec

      - name: Rename binary
        run: mv dist/ITrans dist/ITrans-linux

      - uses: actions/upload-artifact@v4
        with:
          name: ITrans-linux
          path: dist/ITrans-linux

  # macOS 构建
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller ITrans.spec

      - name: Rename binary
        run: mv dist/ITrans dist/ITrans-macos

      - uses: actions/upload-artifact@v4
        with:
          name: ITrans-macos
          path: dist/ITrans-macos

  # Windows 构建
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller ITrans.spec

      - name: Rename binary
        run: mv dist/ITrans.exe dist/ITrans-windows.exe

      - uses: actions/upload-artifact@v4
        with:
          name: ITrans-windows
          path: dist/ITrans-windows.exe

  # 发布到 GitHub Releases
  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ITrans-linux/ITrans-linux
            ITrans-macos/ITrans-macos
            ITrans-windows/ITrans-windows.exe
          body: |
            ## ITrans ${{ github.ref_name }}

            终端翻译工具，支持 Google Translate 和 MyMemory 双引擎。

            ### 下载

            | 平台 | 文件 |
            |------|------|
            | Linux | `ITrans-linux` |
            | macOS | `ITrans-macos` |
            | Windows | `ITrans-windows.exe` |

            ### 使用

            ```bash
            # Linux/macOS
            chmod +x ITrans-*
            ./ITrans-linux              # 启动 TUI
            ./ITrans-linux Hello World  # 简洁模式

            # Windows
            ITrans-windows.exe          # 启动 TUI
            ITrans-windows.exe Hello    # 简洁模式
            ```

            ### pip 安装

            ```bash
            pip install ITrans
            itrans              # 启动 TUI
            itrans Hello World  # 简洁模式
            ```